<div class="page-container">

  <div class="page-header">
    <div>
      <h2>Create Model</h2>
      <p>Add a new inventory model into the system</p>
    </div>
  </div>

  <div class="form-card">

    <div class="card-title">
      <h3>Model Information</h3>
      <span>Enter all required details</span>
    </div>

    <div class="form-grid">

      <div class="form-group">
        <label>Model Name</label>
        <input class="form-control" [(ngModel)]="modelForm.modelName">
      </div>

      <div class="form-group">
        <label>Model Number</label>
        <input class="form-control" [(ngModel)]="modelForm.modelNumber">
      </div>

      <div class="form-group">
        <label>Description</label>
        <input class="form-control" [(ngModel)]="modelForm.description">
      </div>

      <div class="form-group">
        <label>HSN Code</label>
        <input class="form-control" [(ngModel)]="modelForm.hsnCode">
      </div>

      <div class="form-group">
        <label>Selling Price</label>
        <input type="number" class="form-control" [(ngModel)]="modelForm.sellingPrice">
      </div>

      <div class="form-group">
        <label>Cost Price</label>
        <input type="number" class="form-control" [(ngModel)]="modelForm.costPrice">
      </div>



    </div>

    <div class="form-actions">

      <button class="btn btn-secondary" (click)="cancel()">
        Cancel
      </button>

      <button class="btn btn-primary" (click)="save()">
        Save Model
      </button>

    </div>

  </div>

</div>
