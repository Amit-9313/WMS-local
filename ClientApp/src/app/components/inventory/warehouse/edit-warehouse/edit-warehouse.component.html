<div class="page-container">

  <div class="page-header">

    <div>
      <h2>Edit Warehouse</h2>
      <p>Update Warehouse Information</p>
    </div>

  </div>

  <div class="form-card">

    <div class="form-grid">

      <div class="form-group">
        <label>Warehouse Code</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.warehouseCode">
      </div>

      <div class="form-group">
        <label>Warehouse Name</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.warehouseName">
      </div>

      <div class="form-group">
        <label>Branch</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.branch">
      </div>

      <div class="form-group">
        <label>Status</label>

        <select class="form-control"
                [(ngModel)]="warehouseForm.status">

          <option value="Active">
            Active
          </option>

          <option value="Inactive">
            Inactive
          </option>

        </select>

      </div>

      <div class="form-group full-width">

        <label>Address</label>

        <textarea rows="3"
                  class="form-control"
                  [(ngModel)]="warehouseForm.address">
        </textarea>

      </div>

      <div class="form-group full-width">

        <label>
          Select Warehouse Location
        </label>

        <div id="warehouseMap"></div>

        <small class="map-help">
          Click on map to change location
        </small>

      </div>

      <div class="form-group">
        <label>Latitude</label>

        <input class="form-control"
               [(ngModel)]="warehouseForm.latitude"
               readonly>
      </div>

      <div class="form-group">
        <label>Longitude</label>

        <input class="form-control"
               [(ngModel)]="warehouseForm.longitude"
               readonly>
      </div>

      <div class="form-group">
        <label>Timezone</label>

        <input class="form-control"
               [(ngModel)]="warehouseForm.timezone">
      </div>

      <div class="form-group">
        <label>Default Dock Zone</label>

        <input class="form-control"
               [(ngModel)]="warehouseForm.defaultDockZone">
      </div>

      <div class="form-group">
        <label>Total Area (SQFT)</label>

        <input type="number"
               class="form-control"
               [(ngModel)]="warehouseForm.totalAreaSqFt">
      </div>

    </div>

    <div class="form-actions">

      <button class="btn btn-secondary"
              (click)="cancel()">

        Cancel

      </button>

      <button class="btn btn-primary"
              (click)="updateWarehouse()">

        Update Warehouse

      </button>

    </div>

  </div>

</div>
