<div class="create-page">

  <div class="page-header">

    <div>
      <h2>Create Warehouse</h2>
      <p>Create and configure warehouse location</p>
    </div>

  </div>

  <div class="form-card">

    <div class="form-grid">

      <div class="form-group">
        <label>Warehouse Code</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.warehouseCode">
      </div>

      <div class="form-group">
        <label>Warehouse Name</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.warehouseName">
      </div>

      <div class="form-group">
        <label>Branch</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.branch">
      </div>

      <div class="form-group">
        <label>Status</label>

        <select class="form-control"
                [(ngModel)]="warehouseForm.status">

          <option>Active</option>
          <option>Inactive</option>

        </select>

      </div>

      <div class="form-group full-width">

        <label>Address</label>

        <textarea rows="3"
                  class="form-control"
                  [(ngModel)]="warehouseForm.address">
        </textarea>

      </div>

      <div class="form-group full-width">

        <label>Select Location</label>

        <div id="warehouseMap"></div>

      </div>

      <div class="form-group">
        <label>Latitude</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.latitude"
               readonly>
      </div>

      <div class="form-group">
        <label>Longitude</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.longitude"
               readonly>
      </div>

      <div class="form-group">
        <label>Timezone</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.timezone">
      </div>

      <div class="form-group">
        <label>Default Dock Zone</label>
        <input class="form-control"
               [(ngModel)]="warehouseForm.defaultDockZone">
      </div>

      <div class="form-group">
        <label>Total Area (SQFT)</label>
        <input type="number"
               class="form-control"
               [(ngModel)]="warehouseForm.totalAreaSqFt">
      </div>

    </div>

    <div class="footer">

      <button class="btn btn-secondary"
              (click)="cancel()">

        Cancel

      </button>

      <button class="btn btn-primary"
              (click)="saveWarehouse()">

        Save Warehouse

      </button>

    </div>

  </div>

</div>
<div class="rack-section">

  <h3>Add Racks & Shelves</h3>

  <div class="rack-form">

    <input type="text"
           class="form-control"
           placeholder="Rack Name"
           [(ngModel)]="rackName">

    <input type="number"
           class="form-control"
           placeholder="No Of Shelves"
           [(ngModel)]="shelfCount">

    <button class="btn btn-primary"
            (click)="addRack()">

      Add Rack

    </button>

  </div>

  <table *ngIf="racks.length > 0"
         class="rack-table">

    <thead>

      <tr>
        <th>Rack</th>
        <th>No. Of Shelves</th>
      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let rack of racks">

        <td>
          {{ rack.rackName }}
        </td>

        <td>
          {{ rack.shelves.length }}
        </td>

      </tr>

    </tbody>

  </table>

</div>
