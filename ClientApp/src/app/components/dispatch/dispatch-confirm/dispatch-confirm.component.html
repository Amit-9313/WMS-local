<div class="card">

  <h3>Dispatch Confirmation</h3>

  <input placeholder="Vehicle Number"
         [(ngModel)]="vehicleNumber">

  <input placeholder="Driver Name"
         [(ngModel)]="driverName">

  <input placeholder="Driver Mobile"
         [(ngModel)]="driverMobile">

  <input placeholder="LR Number"
         [(ngModel)]="lrNumber">

  <button class="btn-primary"
          (click)="dispatch()">

    Confirm Dispatch

  </button>

</div>
