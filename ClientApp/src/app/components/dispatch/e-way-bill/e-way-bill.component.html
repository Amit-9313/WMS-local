<div class="card">

  <h3>E-Way Bill</h3>

  <label>Bill Number</label>

  <input [(ngModel)]="eWayBillNumber">

  <label>Expiry Date</label>

  <input type="datetime-local"
         [(ngModel)]="expiryDate">

  <div class="warning"
       *ngIf="hoursRemaining < 24">

    Expiring within 24 hours

  </div>

</div>
